<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oops! Nyasar Ya, Sayang? 🗺️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Poppins:wght@300;400;600&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fff5f5;
            background-image: radial-gradient(#ffdfdf 1px, transparent 1px);
            background-size: 20px 20px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #564441;
            overflow: hidden;
            position: relative;
        }

        /* Washi Tape Kuning Pastel untuk variasi */
        .washi-tape {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%) rotate(3deg);
            width: 130px;
            height: 30px;
            background: rgba(255, 235, 156, 0.7);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .card-container {
            position: relative;
            width: 90%;
            max-width: 380px;
        }

        .error-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px 25px;
            box-shadow: 0 10px 30px rgba(163, 122, 116, 0.15);
            text-align: center;
            border: 4px solid #fffdfa;
        }

        .error-code {
            font-family: 'Fredoka', sans-serif;
            font-size: 72px;
            color: #ffabab;
            line-height: 1;
            margin-bottom: 10px;
            letter-spacing: -2px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(-2deg); }
        }

        h2 {
            font-family: 'Fredoka', sans-serif;
            color: #de7a7a;
            font-size: 22px;
            margin-bottom: 15px;
        }

        p {
            font-size: 14px;
            line-height: 1.6;
            color: #6c5a57;
            margin-bottom: 25px;
        }

        .highlight {
            background: #ffe3e3;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            color: #de7a7a;
        }

        /* Tombol Kembali */
        .back-btn {
            display: inline-block;
            text-decoration: none;
            background: #ffabab;
            color: white;
            padding: 12px 24px;
            font-family: 'Fredoka', sans-serif;
            font-size: 16px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(255, 171, 171, 0.4);
            transition: all 0.2s ease;
            width: 100%;
        }

        .back-btn:hover {
            background: #ff9494;
            transform: scale(1.03);
        }

        .back-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="washi-tape"></div>
        <div class="error-card">
            <div class="error-code">404</div>
            <h2>Eh, Kamu Nyasar ke Mana? 🔍</h2>
            
            <p>Halamannya <span class="highlight">nggak ketemu</span> nih. Mungkin dia lagi ngumpet karena minder pas tahu ada cewek secantik kamu mau lewat. 😉</p>
            
            <p>Tenang, tersesat di web ini nggak papa kok, yang penting hati kamu nggak tersesat ke cowok lain, ya!</p>
            
            <a href="index.html" class="back-btn">Kembali ke Pelukan Aku 🧸✨</a>
        </div>
    </div>

</body>
</html>
